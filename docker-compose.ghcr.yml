version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: d3mvpn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-d3mvpn}
      POSTGRES_USER: ${DATABASE_USER:-d3mvpn}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - d3mvpn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-d3mvpn}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: d3mvpn-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me}
    volumes:
      - redis_data:/data
    networks:
      - d3mvpn-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-change-me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (из GitHub Container Registry)
  backend:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_OWNER:-yourusername}/d3m-vpn-miniapp/backend:${IMAGE_TAG:-latest}
    container_name: d3mvpn-backend
    restart: unless-stopped
    pull_policy: always
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost:3000}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me}
      APP_CRYPT_KEY: ${APP_CRYPT_KEY:-change-me}
      BOT_TOKEN: ${BOT_TOKEN:-change-me}
      BOT_SECRET_TOKEN: ${BOT_SECRET_TOKEN:-change-me}
      BOT_SUPPORT_USERNAME: ${BOT_SUPPORT_USERNAME:-support}
      BOT_MINI_APP: "true"
      REMNAWAVE_HOST: ${REMNAWAVE_HOST:-api.remnawave.com}
      REMNAWAVE_PORT: ${REMNAWAVE_PORT:-443}
      REMNAWAVE_TOKEN: ${REMNAWAVE_TOKEN:-change-me}
      REMNAWAVE_WEBHOOK_SECRET: ${REMNAWAVE_WEBHOOK_SECRET:-change-me}
      REMNAWAVE_USE_SSL: "true"
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-d3mvpn}
      DATABASE_USER: ${DATABASE_USER:-d3mvpn}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change-me}
      DATABASE_ECHO: "false"
      DATABASE_POOL_SIZE: 20
      DATABASE_MAX_OVERFLOW: 10
      DATABASE_POOL_TIMEOUT: 30
      DATABASE_POOL_RECYCLE: 3600
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - d3mvpn-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (из GitHub Container Registry)
  frontend:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_OWNER:-yourusername}/d3m-vpn-miniapp/frontend:${IMAGE_TAG:-latest}
    container_name: d3mvpn-frontend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      - backend
    networks:
      - d3mvpn-network

  # Nginx Reverse Proxy (из GitHub Container Registry)
  nginx:
    image: ${REGISTRY:-ghcr.io}/${GITHUB_OWNER:-yourusername}/d3m-vpn-miniapp/nginx:${IMAGE_TAG:-latest}
    container_name: d3mvpn-nginx
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - d3mvpn-network

networks:
  d3mvpn-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
